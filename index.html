<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小工程師的智能家居 💡 (UART 穩定版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex flex-col items-center justify-center min-h-screen font-sans text-white p-4">

    <div class="text-center mb-4">
        <h1 class="text-3xl font-bold mb-2 tracking-wide text-amber-400">🏡 小小工程師的智能家居</h1>
        <p class="text-slate-400 text-sm">第三階段修正版：透過藍牙 UART 穩定感應 🌟</p>
    </div>

    <div class="mb-4 flex flex-col items-center gap-2">
        <button id="btnConnect" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-6 rounded-full shadow-lg transition flex items-center gap-2">
            🤖 步驟 1：連線我的 Micro:bit
        </button>
        <div class="flex gap-4 text-sm mt-1">
            <p>連線狀態: <span id="connectStatus" class="text-red-400 font-bold">尚未連接</span></p>
            <p>真實房間亮度: <span id="lightValueDisplay" class="text-amber-400 font-bold">--</span></p>
        </div>
    </div>

    <div class="relative bg-slate-800 p-4 rounded-2xl shadow-2xl border-4 border-slate-700">
        <canvas id="gameCanvas" width="800" height="450" class="rounded-lg shadow-inner"></canvas>
    </div>

    <div class="mt-6 bg-slate-800 px-8 py-3 rounded-full border border-slate-700 shadow-md">
        <p id="systemMode" class="text-lg font-medium text-slate-300 flex items-center gap-2">
            🔄 請連接 Micro:bit 來啟動自動感應模式...
        </p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let isLightOn = true;
        let bluetoothDevice = null;
        let ledCharacteristic = null;
        let receiveBuffer = ""; // 用來存收到的文字碎片

        // Micro:bit 藍牙專屬魔法代號 (UART 與 LED)
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const UART_TX_CHAR_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // Micro:bit 傳給網頁
        const LED_SERVICE_UUID = 'e95d7b77-251d-470a-a062-fa1922dfa9a8';
        const LED_TEXT_CHAR_UUID = 'e95d93ee-251d-470a-a062-fa1922dfa9a8';

        function drawHouse() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f172a'; ctx.fillRect(500, 50, 250, 200);
            ctx.fillStyle = '#fef08a'; ctx.fillRect(550, 90, 4, 4); ctx.fillRect(680, 80, 4, 4);

            ctx.fillStyle = isLightOn ? '#fef08a' : '#334155'; 
            ctx.fillRect(0, 0, 500, 350); ctx.fillRect(500, 0, 250, 50); ctx.fillRect(500, 250, 250, 100); ctx.fillRect(750, 0, 50, 350);
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 6; ctx.strokeRect(500, 50, 250, 200);

            ctx.fillStyle = isLightOn ? '#b45309' : '#451a03'; ctx.fillRect(0, 350, 800, 100);
            ctx.fillStyle = isLightOn ? '#ef4444' : '#7f1d1d'; 
            ctx.fillRect(150, 250, 250, 100); ctx.fillRect(120, 220, 30, 130); ctx.fillRect(400, 220, 30, 130); ctx.fillRect(150, 180, 250, 70);

            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(275, 0); ctx.lineTo(275, 60); ctx.stroke();
            ctx.fillStyle = isLightOn ? '#fbbf24' : '#94a3b8'; ctx.beginPath(); ctx.arc(275, 75, 15, 0, Math.PI * 2); ctx.fill();

            if (isLightOn) {
                ctx.fillStyle = 'rgba(251, 191, 36, 0.15)';
                ctx.beginPath(); ctx.moveTo(275, 75); ctx.lineTo(50, 350); ctx.lineTo(500, 350); ctx.closePath(); ctx.fill();
            }

            ctx.fillStyle = isLightOn ? '#d97706' : '#78350f'; ctx.fillRect(20, 280, 80, 70);
            ctx.fillStyle = '#1e293b'; ctx.fillRect(35, 240, 50, 40);

            if (!isLightOn) {
                ctx.fillStyle = '#f43f5e';
                ctx.fillRect(51, 250, 6, 6); ctx.fillRect(63, 250, 6, 6); ctx.fillRect(45, 256, 30, 6); ctx.fillRect(51, 262, 18, 6); ctx.fillRect(57, 268, 6, 6);
                ctx.fillStyle = 'rgba(244, 63, 94, 0.2)'; ctx.beginPath(); ctx.arc(60, 255, 35, 0, Math.PI * 2); ctx.fill();
            }
        }

        async function sendToMicrobit(message) {
            if (ledCharacteristic) {
                try {
                    let encoder = new TextEncoder();
                    await ledCharacteristic.writeValue(encoder.encode(message));
                } catch (error) { console.log("傳送失敗: " + error); }
            }
        }

        // 接收電話線傳來的亮度數字
        function handleUartData(event) {
            let decoder = new TextDecoder();
            let textChunk = decoder.decode(event.target.value);
            receiveBuffer += textChunk;

            // 如果收到換行符號，代表一個數字傳完了
            if (receiveBuffer.includes('\n')) {
                let lines = receiveBuffer.split('\n');
                let lastData = lines[lines.length - 2].trim(); // 拿到最新的亮度數字
                receiveBuffer = lines[lines.length - 1]; // 留著還沒傳完的

                let value = parseInt(lastData);
                if (isNaN(value)) return;

                document.getElementById('lightValueDisplay').innerText = value;
                const modeText = document.getElementById('systemMode');

                // 判斷光線開關燈
                if (value < 40) { // 亮度小於 40 算黑夜
                    if (isLightOn !== false) {
                        isLightOn = false;
                        drawHouse();
                        sendToMicrobit("❤️");
                        modeText.innerHTML = "🌃 偵測到環境變暗：已自動開啟「床頭愛心夜燈」！";
                        modeText.className = "text-lg font-medium text-indigo-400 flex items-center gap-2";
                    }
                } else {
                    if (isLightOn !== true) {
                        isLightOn = true;
                        drawHouse();
                        sendToMicrobit(" ");
                        modeText.innerHTML = "💡 偵測到環境明亮：已自動關閉夜燈！";
                        modeText.className = "text-lg font-medium text-amber-400 flex items-center gap-2";
                    }
                }
            }
        }

        document.getElementById('btnConnect').addEventListener('click', async () => {
            const statusText = document.getElementById('connectStatus');
            statusText.innerText = "連線中...";
            
            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID, LED_SERVICE_UUID]
                });

                const server = await bluetoothDevice.gatt.connect();
                
                const ledService = await server.getPrimaryService(LED_SERVICE_UUID);
                ledCharacteristic = await ledService.getCharacteristic(LED_TEXT_CHAR_UUID);

                const uartService = await server.getPrimaryService(UART_SERVICE_UUID);
                const uartRxCharacteristic = await uartService.getCharacteristic(UART_TX_CHAR_UUID);
                
                await uartRxCharacteristic.startNotifications();
                uartRxCharacteristic.addEventListener('characteristicvaluechanged', handleUartData);

                statusText.innerText = "🟢 連線成功 (UART)";
                statusText.className = "text-green-400 font-bold";
                document.getElementById('systemMode').innerText = "🌞 自動感應系統已上線！用手遮住 Micro:bit 正面的螢幕試試看！";
            } catch (error) {
                statusText.innerText = "❌ 連接失敗";
                console.log(error);
            }
        });

        drawHouse();
    </script>
</body>
</html>
